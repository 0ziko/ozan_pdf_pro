<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Master AI | Ozan Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hidden-panel { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease-out; }
        .show-panel { max-height: 200px; opacity: 1; margin-top: 1rem; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="px-8 py-6 flex justify-between items-center max-w-7xl mx-auto">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-gradient-to-tr from-indigo-600 to-pink-500 rounded-xl flex items-center justify-center font-black">P</div>
            <h1 class="text-xl font-extrabold italic">PDF MASTER <span class="text-indigo-400 text-xs font-normal">SECURE</span></h1>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-12 px-6 pb-20">
        <div class="glass rounded-[3rem] p-8 shadow-2xl border-white/5">
            <div id="dropzone" class="border-2 border-dashed border-slate-700 rounded-[2.5rem] p-16 transition-all cursor-pointer hover:border-indigo-500 text-center">
                <input type="file" id="fileInput" multiple class="hidden">
                <div id="zoneContent">
                    <p class="text-xl font-bold">Dosyaları Buraya Sürükle</p>
                    <p class="text-slate-500 text-sm mt-2 italic text-pink-400 font-bold">PDF, Excel veya Resim</p>
                </div>
                <div id="fileStatus" class="hidden">
                    <p id="statusText" class="text-3xl font-black text-indigo-400 tracking-tighter"></p>
                    <p id="fileList" class="text-slate-500 text-sm mt-1 truncate max-w-xs mx-auto italic"></p>
                </div>
            </div>

            <div id="optionsPanel" class="mt-8 space-y-6 hidden">
                <div class="glass p-5 rounded-[2rem] flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-indigo-500/10 rounded-full flex items-center justify-center text-indigo-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <h4 class="text-sm font-bold">PDF Şifreleme Kilidi</h4>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="encryptionToggle" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-pink-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                    </label>
                </div>

                <div id="passwordPanel" class="hidden-panel">
                    <input type="password" id="pdfPassword" placeholder="Açılış şifresi belirle..." class="bg-slate-900 border border-white/10 rounded-2xl p-4 w-full text-center text-lg focus:border-pink-500 outline-none">
                </div>

                <button id="actionBtn" class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 text-white py-6 rounded-[2rem] font-black text-xl shadow-xl active:scale-95 transition-all uppercase tracking-widest">
                    İŞLEMİ BAŞLAT
                </button>
            </div>
        </div>
    </main>

    <script>
        const { PDFDocument } = PDFLib;
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const actionBtn = document.getElementById('actionBtn');
        const encryptionToggle = document.getElementById('encryptionToggle');
        const passwordPanel = document.getElementById('passwordPanel');
        let selectedFiles = [];

        // UI Kontrolleri
        encryptionToggle.onchange = () => {
            passwordPanel.classList.toggle('show-panel', encryptionToggle.checked);
            updateButtonText();
        };

        function updateButtonText() {
            if (!selectedFiles.length) return;
            const ext = selectedFiles[0].name.split('.').pop().toLowerCase();
            let text = (ext === 'pdf' && selectedFiles.length > 1) ? "PDF'LERİ BİRLEŞTİR" : 
                       (ext === 'xlsx' || ext === 'xls') ? "EXCEL'DEN PDF YAP" : "PDF'E DÖNÜŞTÜR";
            
            if (encryptionToggle.checked) text += " VE ŞİFRELE";
            actionBtn.innerText = text;
        }

        dropzone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            selectedFiles = Array.from(e.target.files);
            if (!selectedFiles.length) return;
            document.getElementById('zoneContent').classList.add('hidden');
            document.getElementById('fileStatus').classList.remove('hidden');
            document.getElementById('optionsPanel').classList.remove('hidden');
            document.getElementById('statusText').innerText = `${selectedFiles.length} DOSYA SEÇİLDİ`;
            document.getElementById('fileList').innerText = selectedFiles.map(f => f.name).join(', ');
            updateButtonText();
        };

        // ANA İŞLEM FONKSİYONU
        actionBtn.onclick = async () => {
            if (actionBtn.innerText.includes("YENİ")) { location.reload(); return; }
            actionBtn.innerText = "SİHİR YAPILIYOR...";
            
            const firstFile = selectedFiles[0];
            const ext = firstFile.name.split('.').pop().toLowerCase();
            let finalPdf;

            try {
                // 1. AŞAMA: PDF Verisini Oluştur
                if (['xlsx', 'xls'].includes(ext)) {
                    const data = await firstFile.arrayBuffer();
                    const workbook = XLSX.read(data);
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF('l', 'mm', 'a4');
                    doc.autoTable({ head: [jsonData[0]], body: jsonData.slice(1), styles: { fontSize: 8 } });
                    const pdfArray = doc.output('arraybuffer');
                    finalPdf = await PDFDocument.load(pdfArray);
                } 
                else if (ext === 'pdf') {
                    finalPdf = await PDFDocument.create();
                    for (const f of selectedFiles) {
                        const bytes = await f.arrayBuffer();
                        const doc = await PDFDocument.load(bytes);
                        const pages = await finalPdf.copyPages(doc, doc.getPageIndices());
                        pages.forEach(p => finalPdf.addPage(p));
                    }
                }
                else {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    for (let i = 0; i < selectedFiles.length; i++) {
                        const img = await new Promise(r => {
                            const reader = new FileReader();
                            reader.onload = e => r(e.target.result);
                            reader.readAsDataURL(selectedFiles[i]);
                        });
                        if (i > 0) doc.addPage();
                        doc.addImage(img, 'JPEG', 10, 10, 190, 260);
                    }
                    finalPdf = await PDFDocument.load(doc.output('arraybuffer'));
                }

                // 2. AŞAMA: Şifreleme ve Kaydetme
                const pass = document.getElementById('pdfPassword').value;
                let finalBytes;
                
                if (encryptionToggle.checked && pass) {
                    // pdf-lib ile şifreleme uygula
                    finalBytes = await finalPdf.save({ userPassword: pass, ownerPassword: pass });
                } else {
                    finalBytes = await finalPdf.save();
                }

                // 3. AŞAMA: İndirme
                const blob = new Blob([finalBytes], { type: "application/pdf" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "OZAN_MASTER_RESULT.pdf";
                link.click();

                actionBtn.innerText = "BAŞARILI! YENİ DOSYA İŞLE";
                actionBtn.classList.replace('from-indigo-600', 'from-emerald-600');
            } catch (err) {
                console.error(err);
                alert("Hata: " + err.message);
                actionBtn.innerText = "TEKRAR DENE";
            }
        };
    </script>
</body>
</html>
