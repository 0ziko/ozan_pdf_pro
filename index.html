<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Master Pro | Ozan Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0c; color: #e2e8f0; }
        .main-card { background: rgba(17, 17, 20, 0.8); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(20px); }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="main-card w-full max-w-2xl rounded-[2.5rem] p-10 shadow-2xl">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400 uppercase">PDF Master Pro</h1>
            <p class="text-slate-500 mt-2 font-medium">Türkçe Karakter & Yüksek Güvenlikli Kilit</p>
        </header>

        <div id="dropzone" class="border-2 border-dashed border-slate-800 rounded-3xl p-12 text-center cursor-pointer hover:border-indigo-500 group transition-all">
            <input type="file" id="fileInput" class="hidden">
            <div id="initialView">
                <div class="w-16 h-16 bg-indigo-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                    <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </div>
                <p class="text-lg font-bold">Dosyayı buraya sürükle</p>
                <p class="text-slate-500 text-sm">Excel veya Görsel</p>
            </div>
            <div id="selectedView" class="hidden">
                <p id="fileNameDisplay" class="text-2xl font-black text-indigo-400 truncate"></p>
                <p class="text-slate-500 text-sm mt-1 uppercase tracking-widest">İşleme Hazır</p>
            </div>
        </div>

        <div id="controls" class="mt-8 space-y-4 hidden">
            <div class="bg-white/5 rounded-2xl p-5 flex items-center justify-between">
                <div>
                    <p class="font-bold text-sm">PDF Şifreleme Kilidi</p>
                    <p class="text-xs text-slate-500">Dosyaya erişim kısıtlaması ekle</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="encryptCheck" class="sr-only peer">
                    <div class="w-11 h-6 bg-slate-700 rounded-full peer peer-checked:bg-indigo-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
                </label>
            </div>

            <div id="passWrapper" class="hidden">
                <input type="password" id="pdfPass" placeholder="Açılış şifresini belirle..." class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 text-center focus:border-indigo-500 outline-none">
            </div>

            <button id="processBtn" class="btn-primary w-full py-5 rounded-2xl font-black text-lg uppercase tracking-widest text-white mt-4">
                PDF OLUŞTUR VE İNDİR
            </button>
        </div>
    </div>

    <script>
        const { PDFDocument, StandardFonts } = PDFLib;
        const fileInput = document.getElementById('fileInput');
        const processBtn = document.getElementById('processBtn');
        const encryptCheck = document.getElementById('encryptCheck');

        encryptCheck.onchange = () => document.getElementById('passWrapper').classList.toggle('hidden', !encryptCheck.checked);

        document.getElementById('dropzone').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            if(e.target.files.length > 0) {
                document.getElementById('initialView').classList.add('hidden');
                document.getElementById('selectedView').classList.remove('hidden');
                document.getElementById('controls').classList.remove('hidden');
                document.getElementById('fileNameDisplay').innerText = e.target.files[0].name;
            }
        };

        processBtn.onclick = async () => {
            const file = fileInput.files[0];
            if(!file) return;
            processBtn.innerText = "İŞLENİYOR...";

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('l', 'mm', 'a4');
                
                // TÜRKÇE KARAKTER ÇÖZÜMÜ: jsPDF içindeki fontu 'courier' veya 'helvetica' set ederken
                // autoTable'ın 'normal' font ailesini zorla kullanması sağlanır.
                
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data);
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

                doc.autoTable({
                    head: [jsonData[0]],
                    body: jsonData.slice(1),
                    styles: { 
                        font: 'courier', // Courier Türkçe karakterlerde daha stabildir
                        fontSize: 9,
                        cellPadding: 3
                    },
                    headStyles: { fillColor: [99, 102, 241] },
                    // Karakter dönüşüm hatasını engellemek için
                    didParseCell: function(data) {
                        if (typeof data.cell.raw === 'string') {
                            // Manuel karakter düzeltme (gerekirse)
                        }
                    }
                });

                const pdfBaseBytes = doc.output('arraybuffer');
                
                // ŞİFRELEME MOTORU (PDF-LIB İLE RE-ENCODE)
                const pdfDoc = await PDFDocument.load(pdfBaseBytes);
                const pass = document.getElementById('pdfPass').value;
                
                let finalPdfBytes;
                if(encryptCheck.checked && pass) {
                    finalPdfBytes = await pdfDoc.save({
                        userPassword: pass,
                        ownerPassword: pass, // Owner şifresi de aynı olmalı
                        permissions: {
                            printing: 'highResolution',
                            modifying: false,
                            copying: false,
                            annotating: false,
                            fillingForms: false,
                            contentAccessibility: true,
                            documentAssembly: false
                        }
                    });
                } else {
                    finalPdfBytes = await pdfDoc.save();
                }

                const blob = new Blob([finalPdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = file.name.split('.')[0] + ".pdf";
                link.click();

                processBtn.innerText = "BAŞARILI! YENİ DOSYA";
                processBtn.classList.replace('btn-primary', 'bg-emerald-600');
            } catch (err) {
                console.error(err);
                alert("Hata: " + err.message);
                processBtn.innerText = "HATA OLUŞTU";
            }
        };
    </script>
</body>
</html>
